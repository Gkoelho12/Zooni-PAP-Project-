<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <title>Zooni — Setup Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #F2F8F2;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 2.5rem;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 8px 30px rgba(61, 139, 61, 0.12);
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
            color: #1E4D1E;
        }

        p {
            font-size: 0.85rem;
            color: #5a7a5a;
            margin-bottom: 2rem;
        }

        label {
            display: block;
            font-size: 0.78rem;
            font-weight: 700;
            color: #5a7a5a;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            margin-bottom: 4px;
        }

        input {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #c8e6c8;
            border-radius: 10px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            outline: none;
            box-sizing: border-box;
        }

        input:focus {
            border-color: #3D8B3D;
        }

        button {
            width: 100%;
            background: #3D8B3D;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
        }

        button:hover {
            background: #1E4D1E;
        }

        .msg {
            margin-top: 1rem;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            display: none;
        }

        .success {
            background: #d1fae5;
            color: #065f46;
            display: block;
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
            display: block;
        }

        .warning {
            background: #fef3c7;
            color: #92400e;
            font-size: 0.8rem;
            border-radius: 8px;
            padding: 8px 12px;
            margin-bottom: 1.5rem;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>🛡️ Criar Conta Admin</h1>
        <p>Cria o teu acesso de administrador Zooni. Apaga esta página depois.</p>
        <div class="warning">⚠️ Esta página deve ser eliminada após o setup estar concluído.</div>

        <label>Email</label>
        <input type="email" id="email" placeholder="admin@zooni.pt">

        <label>Password</label>
        <input type="password" id="password" placeholder="Mínimo 6 caracteres">

        <button onclick="createAdmin()" id="btn">Criar Conta Admin</button>

        <div class="msg" id="msg"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script>
        const sb = supabase.createClient(
            'https://xqtbtggmwejnkhckduti.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhxdGJ0Z2dtd2VqbmtoY2tkdXRpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc2OTU5NjEsImV4cCI6MjA4MzI3MTk2MX0.G1wG0UC6sF7r6tMxGdqLGvsHa_dxlVD1-j6QNEw32IM'
        );

        async function createAdmin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btn');
            const msg = document.getElementById('msg');
            msg.className = 'msg'; msg.textContent = '';

            if (!email || password.length < 6) {
                msg.className = 'msg error'; msg.textContent = 'Preenche email e password (mín. 6 caracteres).'; return;
            }

            btn.disabled = true; btn.textContent = 'A criar...';

            // 1. Register auth user
            const { data: authData, error: authErr } = await sb.auth.signUp({ email, password });
            if (authErr) {
                msg.className = 'msg error'; msg.textContent = 'Erro: ' + authErr.message;
                btn.disabled = false; btn.textContent = 'Criar Conta Admin'; return;
            }

            // 2. Insert into admins table
            const { error: dbErr } = await sb.from('admins').insert([{ id: authData.user.id }]);
            if (dbErr) {
                msg.className = 'msg error'; msg.textContent = 'Conta criada mas erro ao guardar em admins: ' + dbErr.message;
                btn.disabled = false; btn.textContent = 'Criar Conta Admin'; return;
            }

            msg.className = 'msg success';
            msg.innerHTML = `✅ Conta admin criada com sucesso!<br><br>
                <strong>Email:</strong> ${email}<br>
                <strong>Acesso:</strong> <a href="login.html?role=admin">login.html?role=admin</a><br><br>
                Podes agora apagar o ficheiro <strong>setup_admin.html</strong>.`;
            btn.textContent = '✓ Concluído';
        }
    </script>
</body>

</html>
