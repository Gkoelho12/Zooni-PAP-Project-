<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zooni - Bem-vindo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #3D8B3D;
            --primary-dark: #1E4D1E;
            --primary-light: #5CB85C;
            --bg-color: #F2F8F2;
            --text-main: #1a2e1a;
            --text-sec: #5a7a5a;
            --card-bg: #FFFFFF;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Outfit', sans-serif;
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            max-width: 960px;
            width: 100%;
        }

        .logo-img {
            max-width: 220px;
            margin-bottom: 2rem;
        }

        .hero-section {
            padding: 4rem 1rem;
            max-width: 800px;
            margin: 0 auto;
            background-color: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(61, 139, 61, 0.12);
            text-align: center;
        }

        h1 {
            font-size: 2.6rem;
            font-weight: 800;
            margin-bottom: 1rem;
            color: var(--primary-dark);
        }

        p {
            font-size: 1.1rem;
            color: var(--text-sec);
            margin-bottom: 3rem;
        }

        .btn-group-custom {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-custom {
            padding: 18px 35px;
            font-size: 1.05rem;
            font-weight: 700;
            border-radius: 16px;
            transition: all 0.3s;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 20px rgba(61, 139, 61, 0.2);
        }

        .btn-owner {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .btn-vet {
            background-color: white;
            color: var(--primary-dark);
            border: 2px solid var(--primary);
        }

        .btn-custom:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 30px rgba(61, 139, 61, 0.3);
            color: inherit;
        }
    </style>
</head>

<body>
    <div class="container text-center">
        <div class="hero-section">
            <img src="assets/logo.png" alt="Zooni Logo" class="logo-img">
            <h1>Cuidado animal levado a sério.</h1>
            <p>A plataforma que une donos de pets e médicos veterinários para uma vida mais longa e feliz dos nossos
                melhores amigos.</p>

            <div class="btn-group-custom">
                <a href="login.html?role=dono" class="btn-custom btn-owner">
                    <i class="fa-solid fa-house-user"></i> Sou Dono de Pet
                </a>
                <a href="login.html?role=veterinario" class="btn-custom btn-vet">
                    <i class="fa-solid fa-user-doctor"></i> Sou Veterinário
                </a>
            </div>
        </div>
    </div>
</body>

</html>
